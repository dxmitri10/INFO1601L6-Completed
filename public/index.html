<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Demo</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  </head>
  <body>
    <nav>
      <div class="nav-wrapper teal" style="padding-left: 10px;">
        <a href="#!" class="brand-logo">Ajax Demo</a>
      </div>
    </nav>
    <main class="row" style="padding: 40px">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Type</th>
            <th>Website</th>
          </tr>
        </thead>
        <tbody id="tableResult">
        </tbody>
      </table>
    </main>

    <h1>My Page</h1>

    <div style="padding: 20px">
      <input type="button" id="alertBtn" value="alert" onclick="alertFun()"/>
      <input type="button" value="confirm" onclick="confirmFun()"/>
      <input type="button" value="prompt" onclick="promptFun()"/>

      <span id="displayResult"></span>

      <input id="myBtn" type="button" onclick="myFun()" value="click me"/>
      <br><br>
      <img id="cageImg" src="https://placecage.lucidinternets.com/200/300" alt="Nicolas Cage placeholder" />
    </div>

    <script>

      function drawTable(records) {
        let result = document.querySelector('#tableResult'); 
        let html = '';
        for (let record of records) {
          html += `<tr id="${record.id}">
            <td>${record.id}</td>
            <td>${record.name}</td>
            <td>${record.brewery_type}</td>
            <td><a href="#${record.id}" onclick="getData('https://api.openbrewerydb.org/breweries/${record.id}', drawDetails)">View More Details</a></td>
          </tr>`;
        }
        result.innerHTML = html;
      }

      function drawDetails(record) {
        console.log(record);
      }

      function alertFun() {
        alert("Hello !");
      }
      function confirmFun() {
        let didConfirm = confirm("Are you sure about that?");
        if (didConfirm) {
          alert("you confirm :)");
        } else {
          alert("you did not confirm :(");
        }
      }
      function promptFun() {
        let val = prompt("What is your name?");
        alert(`You've entered: ${val}`);
      }

      console.log(window.navigator.cookieEnabled);
      console.log(window.navigator.onLine);
      console.log(navigator.appVersion);
      console.log(navigator.userAgent);
      console.log(navigator.platform);
      console.log(window.location.href);
      console.log(window.location.protocol);
      console.log(window.location.hostname);

      function redirect(url) {
        window.location.assign(url);
      }

      window.onload = function (event) {
        console.log("page is loaded");
      };

      const fallbackData = [
        { id: 1, name: "Bob's Brewery", brewery_type: "micro", website_url: "https://bobsbrewery.com" },
        { id: 2, name: "Harry's Ales", brewery_type: "brewpub", website_url: "https://harrysales.com" },
        { id: 3, name: "The Hoppy Place", brewery_type: "regional", website_url: "https://thehoppyplace.com" },
        { id: 4, name: "Golden Tap Co.", brewery_type: "large", website_url: "https://goldentap.com" },
        { id: 5, name: "River Bend Brew", brewery_type: "nano", website_url: "https://riverbendbrew.com" },
      ];

      async function getData(url, renderFun) {
        try {
          let response = await fetch(url);
          if (!response.ok) throw new Error("Network response was not ok");
          let result = await response.json();
          renderFun(result);
        } catch(e) {
          console.log("Fetch failed, using fallback data:", e);
          renderFun(fallbackData);
        }
      }

      getData("https://api.openbrewerydb.org/breweries", drawTable);

      const displayResult = document.querySelector('#displayResult');
      displayResult.innerHTML = '<h2>My result</h2>';
      displayResult.style.color = 'blue';

      function myFun() {
        alert("hello");
      }
      function myFun2() {
        console.log("myFun2 called");
      }
      function logEventType(event) {
        console.log(event.type);
      }

      let myBtn = document.querySelector('#myBtn');
      myBtn.addEventListener('click', myFun2);
      myBtn.addEventListener("mouseover", logEventType);
      myBtn.addEventListener("mouseout", logEventType);

      function loaded() {
        console.log("img is loaded");
      }
      let cageImg = document.querySelector('#cageImg');
      cageImg.addEventListener('load', loaded);

    </script>
  </body>
</html>
